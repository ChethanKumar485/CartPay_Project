          stroke="#0066FF"
          stroke-width="6"/>

    <line x1="15" y1="10" x2="30" y2="20"
          stroke="#0066FF"
          stroke-width="6"/>

    <circle cx="35" cy="85" r="8" fill="#0066FF"/>
    <circle cx="80" cy="85" r="8" fill="#0066FF"/>
  </g>

  <!-- Green Checkmark -->
  <path d="M110 95 L125 110 L155 75"
