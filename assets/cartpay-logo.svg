```svg
<svg width="500" height="180" viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">

  <rect width="500" height="180" fill="#ffffff"/>

  <!-- Shopping Cart -->
  <g transform="translate(20,35)">
    <rect x="20" y="20" width="70" height="45"
          rx="6"
